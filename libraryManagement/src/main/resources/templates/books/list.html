<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Book List</title>
    <meta charset="UTF-8">
</head>
<body>

<h1>Library Books</h1>

<a th:href="@{/books/add}">Add New Book</a>
<br><br>

<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>ISBN</th>
        <th>Title</th>
        <th>Author</th>
        <th>Publisher</th>
        <th>Year</th>
        <th>Total Copies</th>
        <th>Available Copies</th>
        <th>Shelf Location</th>
        <th>Status</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="book : ${books}">
        <td th:text="${book.id}"></td>
        <td th:text="${book.isbn}"></td>
        <td th:text="${book.title}"></td>
        <td th:text="${book.author}"></td>
        <td th:text="${book.publisher}"></td>
        <td th:text="${book.publicationYear}"></td>
        <td th:text="${book.totalCopies}"></td>
        <td th:text="${book.availableCopies}"></td>
        <td th:text="${book.shelfLocation}"></td>
        <td th:text="${book.status}"></td>
        <td>
            <a th:href="@{/books/edit/{id}(id=${book.id})}">Edit</a>
            |
            <a th:href="@{/books/delete/{id}(id=${book.id})}"
               onclick="return confirm('Are you sure you want to delete this book?');">
                Delete
            </a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
