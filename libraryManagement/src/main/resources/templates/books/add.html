<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add / Edit Book</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="fragments/header :: navbar"></div>

<div class="container">
    <h1 class="mb-20" th:text="${book.id == null} ? 'Add Book' : 'Edit Book'">Add Book</h1>

    <div class="form-card">
        <form th:action="@{/books/save}" th:object="${book}" method="post">

            <input type="hidden" th:field="*{id}">

            <div class="form-group">
                <label for="title">Title</label>
                <input class="form-control" type="text" id="title" th:field="*{title}" required>
            </div>

            <div class="form-group">
                <label for="author">Author</label>
                <input class="form-control" type="text" id="author" th:field="*{author}" required>
            </div>

            <div class="form-group">
                <label for="isbn">ISBN</label>
                <input class="form-control" type="text" id="isbn" th:field="*{isbn}">
            </div>

            <div class="form-group">
                <label for="totalCopies">Total Copies</label>
                <input class="form-control" type="number" id="totalCopies" th:field="*{totalCopies}" min="0" required>
            </div>

            <div class="form-group">
                <label for="availableCopies">Available Copies</label>
                <input class="form-control" type="number" id="availableCopies" th:field="*{availableCopies}" min="0" required>
            </div>

            <div class="form-group">
                <label for="status">Status</label>
                <input class="form-control" type="text" id="status" th:field="*{status}" placeholder="Available">
            </div>

            <button type="submit" class="btn">Save Book</button>
            <a th:href="@{/books}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>

</body>
</html>
