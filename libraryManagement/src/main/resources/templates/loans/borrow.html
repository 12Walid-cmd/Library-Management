<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Borrow Book</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="fragments/header :: navbar"></div>

<div class="container">
    <h1 class="mb-20">Borrow a Book</h1>

    <div th:if="${error}" class="alert alert-error">
        <p th:text="${error}"></p>
    </div>

    <div class="form-card">
        <form th:action="@{/loans/borrow}" method="post">

            <div class="form-group">
                <label for="clientId">Select Client</label>
                <select class="form-control" name="clientId" id="clientId" required>
                    <option value="">-- Choose Client --</option>
                    <option th:each="client : ${clients}"
                            th:value="${client.id}"
                            th:text="${client.firstName + ' ' + client.lastName}">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label for="bookId">Select Book</label>
                <select class="form-control" name="bookId" id="bookId" required>
                    <option value="">-- Choose Book --</option>
                    <option th:each="book : ${books}"
                            th:value="${book.id}"
                            th:text="${book.title + ' (Available: ' + book.availableCopies + ')'}">
                    </option>
                </select>
            </div>

            <button type="submit" class="btn">Borrow Book</button>
            <a th:href="@{/loans}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>

</body>
</html>
